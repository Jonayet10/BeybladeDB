<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BeybladeDB - Login</title>
    <link rel="stylesheet" href="/web/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="card login-card">
        <h1>BeybladeDB</h1>
        <p class="muted">Login to manage your Beyblade collection.</p>

        <div class="row">
          <input id="loginUsername" type="text" placeholder="username">
          <input id="loginPassword" type="password" placeholder="password">
          <button id="btnLogin">Login</button>
        </div>

        <div class="msg" id="loginMsg"></div>
      </div>
    </div>

    <section class="hero-image">
      <img src="/web/beyblade-hero.jpg" alt="Beyblade Arena">

      <p class="image-credit">
        Image source:
        <a href="https://wallpapercave.com/beyblade-shogun-steel-wallpapers" target="_blank">
          WallpaperCave – Beyblade Shogun Steel Wallpapers
        </a>
      </p>
    </section>

    <script src="/web/app.js"></script>

  </body>
</html>
